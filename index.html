<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空大輔考研究社 - 期中考特訓</title>
    <meta name="description" content="空大輔考研究社期中考特訓網頁，提供性別健康與多元文化、人際關係與溝通兩門課程。">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-container">
        <img src="assets/bg.png" alt="Background" class="hero-bg">
    </div>

    <nav>
        <div class="container">
            <div class="logo">空大輔考研究社</div>
            <div class="nav-links">
                <a href="#courses">精選課程</a>
                <a href="#">關於我們</a>
            </div>
        </div>
    </nav>

    <header>
        <div class="container hero-content">
            <div class="badge">學期衝刺現正開始</div>
            <h1>期中考特訓<br><span class="highlight">助您高分連連</span></h1>
            <p>專業輔考筆記與精選影片，專為空大學生打造的高效率學習體驗。</p>
            <div class="hero-btns">
                <a href="#courses" class="btn primary">開始學習</a>
                <a href="#" class="btn secondary">深入瞭解</a>
            </div>
        </div>
    </header>

    <main id="courses">
        <div class="container">
            <h2 class="section-title">熱門特訓課程</h2>
            <div class="course-grid">
                <!-- Course Card 1 -->
                <div class="course-card" id="gender-card">
                    <div class="card-image">
                        <img src="assets/gender.png" alt="性別健康與多元文化">
                    </div>
                    <div class="card-content">
                        <h3>性別教育</h3>
                        <p>深入探討性別議題與健康，掌握考試必考重點與考古題分析。</p>
                        <a href="https://m0904103.github.io/gender-study-pro/v8.html" class="course-btn">進入課程</a>
                    </div>
                </div>

                <!-- Course Card 2 -->
                <div class="course-card" id="interpersonal-card">
                    <div class="card-image">
                        <img src="assets/interpersonal.png" alt="人際關係與協商">
                    </div>
                    <div class="card-content">
                        <h3>人際關係與協商</h3>
                        <p>掌握職場與生活中的溝通精髓，精準命中考題核心。</p>
                        <a href="https://m0904103.github.io/gender-study-pro/interpersonal.html" class="course-btn">進入課程</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 空大輔考研究社. 版權所有.</p>
        </div>
    </footer>

    <script src="script.js"></script>

</html>
